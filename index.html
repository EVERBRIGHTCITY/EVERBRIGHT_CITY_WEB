<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Everbright City</title>
    <style>
        :root {
            --bg-bright: #ffffff;
            --park-green: #2a9d8f;
            --park-orange: #f4a261;
            --text-dark: #1a1c23;
            --text-muted: #6c757d;
            --border-light: #eef0ec;
            
            /* Secure Override Colors */
            --admin-bg: #0b0f19;
            --admin-green: #00ff66;
            --admin-text: #e0e6ed;
            
            --sans-font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --mono-font: "Courier New", Courier, monospace;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body {
            background-color: var(--bg-bright);
            color: var(--text-dark);
            font-family: var(--sans-font);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s ease;
            -webkit-font-smoothing: antialiased;
        }

        /* --- MODERN NAVIGATION HEADER --- */
        header {
            width: 100%;
            background: #ffffff;
            border-bottom: 1px solid var(--border-light);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-brand img {
            height: 70px;
            width: auto;
            display: block;
        }
        .nav-right-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .btn-portal-trigger {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            color: var(--text-dark);
            padding: 10px 24px;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            letter-spacing: 0.3px;
        }
        .btn-portal-trigger:hover {
            background: var(--text-dark);
            color: #ffffff;
            border-color: var(--text-dark);
        }

        /* --- IMMERSIVE HERO BANNER --- */
        .hero-banner {
            width: 100%;
            height: 480px;
            background-color: #1a1c23;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        /* --- EXPLORATION CARD GRID --- */
        .content-container {
            max-width: 1200px;
            width: 100%;
            margin: 60px auto;
            padding: 0 24px;
        }
        .section-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 30px;
            color: var(--text-dark);
            letter-spacing: -0.3px;
        }
        .attraction-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }
        .attraction-card {
            background: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-light);
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .attraction-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(0,0,0,0.04);
        }
        .card-img-container {
            width: 100%;
            height: 220px;
            background: #f2efe9;
            overflow: hidden;
            position: relative;
        }
        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .card-body {
            padding: 24px;
            border-top: 1px solid var(--border-light);
        }
        .card-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        /* --- SIGN-IN MODAL --- */
        .login-modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        .login-card {
            width: 100%;
            max-width: 380px;
            background: #ffffff;
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            position: relative;
        }
        .login-card h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 24px;
            text-align: center;
            letter-spacing: -0.3px;
        }
        .input-group {
            margin-bottom: 18px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid #ced4da;
            border-radius: 10px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-group input:focus {
            border-color: var(--park-green);
            box-shadow: 0 0 0 3px rgba(42, 157, 143, 0.15);
        }
        .error-message {
            color: #d9534f;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 18px;
            text-align: center;
            display: none;
        }
        .btn-submit {
            width: 100%;
            background: var(--text-dark);
            color: #ffffff;
            border: none;
            padding: 15px;
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-submit:hover {
            opacity: 0.9;
        }
        .btn-close-modal {
            position: absolute;
            top: 22px; right: 22px;
            background: transparent;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-muted);
            line-height: 1;
        }

        /* --- RETRO CRT TV GLITCH OVERLAY --- */
        .flash-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999;
            pointer-events: none;
            background: #000000;
        }
        .glitched-state {
            display: block !important;
            animation: crtTvStatic 0.65s steps(1) forwards;
        }
        
        @keyframes crtTvStatic {
            0% { 
                background: #0d0d0d; 
                opacity: 1;
            }
            12% { 
                background: linear-gradient(rgba(18,16,16,0) 40%, rgba(0,0,0,0.6) 40%), 
                            linear-gradient(90deg, rgba(255,0,0,0.15), rgba(0,255,0,0.1), rgba(0,0,255,0.15));
                background-size: 100% 5px, 8px 100%;
                transform: scaleY(1.15) skewX(-10deg);
                filter: brightness(1.5) contrast(1.2);
            }
            25% { 
                background: #ffffff; 
                clip-path: inset(25% 0 50% 0);
                transform: translateX(-35px) scaleY(1.05);
            }
            38% { 
                background: #1a1a1a;
                clip-path: inset(65% 0 15% 0);
                transform: translateX(40px) scaleY(0.85);
            }
            50% { 
                background: linear-gradient(#333 50%, #fff 50%);
                background-size: 100% 20px;
                transform: skewX(8deg) scaleX(1.1);
                filter: blur(2px);
            }
            65% {
                background: #111;
                transform: translateX(-10px) translateY(10px);
                clip-path: inset(10% 0 80% 0);
            }
            78% { 
                background: #ffffff;
                transform: scaleY(0.02) scaleX(1.4);
                filter: brightness(4) blur(0.5px);
                opacity: 1;
            }
            90% { 
                background: #ffffff;
                transform: scaleY(0.005) scaleX(0.01);
                opacity: 1;
            }
            100% { 
                display: none; 
                opacity: 0; 
                transform: scale(0);
            }
        }

        /* --- DECRYPTED TERMINAL INTERFACE --- */
        .decrypted-wrapper {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--admin-bg);
            z-index: 5000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .decrypted-card {
            width: 100%;
            max-width: 480px;
            background: #11141a;
            border: 2px solid #222831;
            border-radius: 12px;
            padding: 30px;
            font-family: var(--mono-font);
            box-shadow: 0 0 30px rgba(0, 255, 102, 0.05);
        }
        .decrypted-header {
            color: var(--admin-green);
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 25px;
            padding-bottom: 12px;
            border-bottom: 1px dashed #333945;
            letter-spacing: 0.5px;
        }
        
        .prompt-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 0;
        }
        .btn-decrypt {
            background: transparent;
            border: 1px solid var(--admin-green);
            color: var(--admin-green);
            font-family: var(--mono-font);
            font-size: 0.85rem;
            padding: 12px 20px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.1);
        }
        .btn-decrypt:hover {
            background: var(--admin-green);
            color: var(--admin-bg);
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.3);
            font-weight: bold;
        }

        .decrypted-body {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--admin-text);
            animation: textReveal 0.3s ease-out forwards;
        }
        @keyframes textReveal {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .highlight-box {
            margin: 25px 0;
            border-left: 4px solid var(--admin-green);
            background: rgba(0, 255, 102, 0.05);
            padding: 16px;
            font-size: 1rem;
            font-weight: bold;
            color: #ffffff;
        }
        .footer-stamp {
            margin-top: 30px;
            font-size: 0.75rem;
            color: #4e5766;
            text-align: right;
            border-top: 1px dashed #333945;
            padding-top: 10px;
        }

        @media (max-width: 768px) {
            .hero-banner h1 { font-size: 2.25rem; }
            .content-container { margin: 40px auto; }
            .attraction-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="flash-overlay" id="systemFlash"></div>

    <header id="mainNav">
        <div class="nav-container">
            <div class="nav-brand">
                <img src="logo.png" alt="Everbright City Logo">
            </div>
            <div class="nav-right-actions">
                <button class="btn-portal-trigger" onclick="openLoginModal()">Sign In</button>
            </div>
        </div>
    </header>

    <div id="viewPublicLayout">
        <section class="hero-banner" style="position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 480px; text-align: center; overflow: hidden;">
            
            <img src="entrance.png" alt="Everbright City Theme Park" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1;">
            
            <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(26, 28, 35, 0.65); z-index: 2;"></div>

            <div style="position: relative; z-index: 3; color: #ffffff; padding: 20px;">
                <h1 style="font-size: 3.5rem; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.5px; text-shadow: 0 4px 20px rgba(0,0,0,0.5);">Everbright City</h1>
                <p style="font-size: 1.25rem; font-weight: 400; letter-spacing: 0.5px; text-shadow: 0 2px 10px rgba(0,0,0,0.5);">No pain. No worry. No memory burden.</p>
            </div>
        </section>

        <main class="content-container">
            <h2 class="section-title">Do you want to experience...</h2>
            
            <div class="attraction-grid">
                <div class="attraction-card">
                    <div class="card-img-container">
                        <img src="nopain.png" alt="No Pain" class="card-img">
                    </div>
                    <div class="card-body">
                        <div class="card-title">No Pain</div>
                    </div>
                </div>

                <div class="attraction-card">
                    <div class="card-img-container">
                        <img src="noworry.png" alt="No Worry" class="card-img">
                    </div>
                    <div class="card-body">
                        <div class="card-title">No Worry</div>
                    </div>
                </div>

                <div class="attraction-card">
                    <div class="card-img-container">
                        <img src="nomemory.png" alt="No Memory Burden" class="card-img">
                    </div>
                    <div class="card-body">
                        <div class="card-title">No Memory Burden</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="login-modal-overlay" id="loginModal">
        <div class="login-card">
            <button class="btn-close-modal" onclick="closeLoginModal()">&times;</button>
            <h2>Sign-In</h2>
            
            <div class="input-group">
                <input type="text" id="username" placeholder="Username" autocomplete="off" onkeydown="handleKeyAuth(event)">
            </div>
            
            <div class="input-group">
                <input type="password" id="password" placeholder="Password" onkeydown="handleKeyAuth(event)">
            </div>

            <div id="loginError" class="error-message">Invalid. Please try again.</div>

            <button class="btn-submit" onclick="validateCredentials()">Continue</button>
        </div>
    </div>

    <section class="decrypted-wrapper" id="viewDecrypted">
        <div class="decrypted-card">
            <div class="decrypted-header" id="terminalHeader">
                &gt; WELCOME BACK, DR. LEUNG.
            </div>
            
            <div class="prompt-container" id="decryptionPrompt">
                <button class="btn-decrypt" onclick="executeSecureDecryption()">[ ACCESS STATION LOGS ]</button>
            </div>

            <div id="secureDataContent" style="display: none;">
                <div class="decrypted-body">   
                    <div class="highlight-box">
                        FINALLY SOMEONE FIGURED OUT, WHAT YOU ARE SEARCHING FOR IS HIDDEN BEHIND ROOM N12.
                    </div>
                </div>
                <div class="footer-stamp">
                    #0620-LEUNG
                </div>
            </div>
        </div>
    </section>

    <script>
        function openLoginModal() {
            document.getElementById('loginModal').style.display = 'flex';
            document.getElementById('username').focus();
        }

        function closeLoginModal() {
            document.getElementById('loginModal').style.display = 'none';
        }

        function handleKeyAuth(event) {
            if (event.key === "Enter") {
                validateCredentials();
            }
        }

        function validateCredentials() {
            const userVal = document.getElementById('username').value.trim();
            const passVal = document.getElementById('password').value.trim();
            const errorLabel = document.getElementById('loginError');

            if (userVal === "Dr. Leung" && passVal === "123456") {
                errorLabel.style.display = 'none';
                closeLoginModal();
                triggerCinematicShift();
            } else {
                errorLabel.style.display = 'block';
            }
        }

        function triggerCinematicShift() {
            const flash = document.getElementById('systemFlash');
            
            flash.style.display = 'block';
            flash.classList.add('glitched-state');

            setTimeout(() => {
                document.getElementById('mainNav').style.display = 'none';
                document.getElementById('viewPublicLayout').style.display = 'none';
                
                document.getElementById('viewDecrypted').style.display = 'flex';
            }, 320);

            setTimeout(() => {
                flash.style.display = 'none';
                flash.classList.remove('glitched-state');
            }, 650);
        }

        function executeSecureDecryption() {
            const promptZone = document.getElementById('decryptionPrompt');
            const hiddenLogs = document.getElementById('secureDataContent');
            const headerText = document.getElementById('terminalHeader');

            headerText.innerHTML = "&gt; DECRYPTING LOG CHANNELS...";
            promptZone.style.display = 'none';

            setTimeout(() => {
                headerText.innerHTML = "&gt; DATA UNLOCKED";
                hiddenLogs.style.display = 'block';
            }, 600);
        }
    </script>
</body>
</html>
